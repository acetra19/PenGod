# Reverse proxy for PenGod API (TLS: see comments below).
server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    # Docker DNS (127.0.0.11): without resolver, nginx caches pengod's IP at startup —
    # after container recreate you get instant 502 from the host while exec wget still works.
    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_pengod pengod;
        proxy_pass http://$upstream_pengod:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strategist / Ollama can exceed 2 minutes; default 60s causes 502 HTML from nginx.
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }
}

