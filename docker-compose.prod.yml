# Production-style stack: Qdrant and PenGod are NOT published to the host;
# only Nginx exposes HTTP (optionally HTTPS after you add certs).
# Usage: docker compose -f docker-compose.prod.yml up -d --build
services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - pengod_internal

  # Ollama in the same Docker network — avoids Linux host.docker.internal / firewall issues.
  # Default Strategist model is small for ~8GB RAM VPS (llama3 8B often OOMs with Qdrant + API).
  # After first start: docker compose -f docker-compose.prod.yml exec ollama ollama pull llama3.2:3b
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      # Fewer threads = lower peak RAM on small VPS (slower but stabler).
      OLLAMA_NUM_THREAD: "2"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pengod_internal

  pengod:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_STRICT: "false"
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      EMBEDDING_VECTOR_SIZE: "384"
      HF_HOME: /root/.cache/huggingface
      OLLAMA_BASE_URL: http://ollama:11434
      STRATEGIST_MODEL: llama3.2:3b
      STRATEGIST_RAG_LIMIT: "3"
      STRATEGIST_MAX_USER_CHARS: "3500"
      STRATEGIST_OLLAMA_NUM_CTX: "2048"
      STRATEGIST_OLLAMA_NUM_PREDICT: "512"
    depends_on:
      - qdrant
      - ollama
    volumes:
      - pengod_hf_cache:/root/.cache/huggingface
      - ./data:/data:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - pengod_internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Host 8080 avoids conflict when another service already uses port 80
      - "8080:80"
      # - "8443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - pengod
    networks:
      - pengod_internal

networks:
  pengod_internal:
    driver: bridge

volumes:
  qdrant_data:
  pengod_hf_cache:
  ollama_data:
